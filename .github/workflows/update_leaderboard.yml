name: 🏆 Update Leaderboard

on:
  push:
    branches: [main]
    paths:
      - 'Week-**/**'
      - '!Week-**/README.md'
  workflow_dispatch:

jobs:
  update-leaderboard:
    name: Update Leaderboard in README
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Count solutions and update leaderboard
        run: python3 scripts/update_leaderboard.py

      - name: Commit updated README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update leaderboard [skip ci]"
          file_pattern: README.md
