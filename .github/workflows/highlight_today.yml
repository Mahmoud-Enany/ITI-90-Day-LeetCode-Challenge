name: 📅 Highlight Today's Challenge

on:
  schedule:
    # Midnight Cairo time = 21:00 UTC (Cairo is UTC+3)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  highlight-today:
    name: Mark Today's Day in Week README
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Highlight today's section
        run: python3 scripts/highlight_today.py

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📅 Auto-highlight today's challenge [skip ci]"
          file_pattern: "Week-*/README.md"
