name: ✅ PR Solution Checker

on:
  pull_request:
    branches: [main]
    paths:
      - 'Week-**/**'
      - '!Week-**/README.md'

jobs:
  check-solution:
    name: Check Solution Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            Week-**/**
          files_ignore: |
            Week-**/README.md
            **/.gitkeep

      - name: Check file naming convention
        run: |
          echo "Checking file names..."
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
            echo "No solution files changed."
            exit 0
          fi
          # YourName.ext inside Week-XX/NN-Problem Name/
          pattern='^[A-Za-z][A-Za-z0-9_-]*\.(c|cpp|cc|cxx|py|java|kt|kts|scala|groovy|js|mjs|jsx|ts|tsx|cs|fs|fsx|vb|go|rs|zig|nim|d|v|swift|m|mm|rb|php|lua|pl|pm|tcl|hs|ml|mli|clj|erl|ex|exs|dart|r|R|jl|pas|cr|coffee|f90|f95|adb)$'
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            case "$file" in
              Week-*/[0-9][0-9]-*/*) ;;
              *)
                echo "Skipping non-solution path: $file"
                continue
                ;;
            esac
            filename=$(basename "$file")
            if [ "$filename" = ".gitkeep" ]; then
              continue
            fi
            if ! echo "$filename" | grep -qE "$pattern"; then
              echo "Invalid filename: $filename"
              echo "Expected: YourName.ext inside Week-XX/NN-Problem Name/ (e.g. Ashraf.cpp)"
              exit 1
            fi
            echo "Valid filename: $filename"
          done

      - name: Check author header comment
        run: |
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ]; then exit 0; fi
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            case "$file" in
              Week-*/[0-9][0-9]-*/*) ;;
              *) continue ;;
            esac
            [ "$(basename "$file")" = ".gitkeep" ] && continue
            if ! head -10 "$file" | grep -qi "author:"; then
              echo "Missing 'Author:' header in: $file"
              exit 1
            fi
          done

      - name: Compile C/C++ solutions
        run: |
          if [ -z "${{ steps.changed-files.outputs.all_changed_files }}" ]; then exit 0; fi
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            case "$file" in
              Week-*/[0-9][0-9]-*/*.cpp|Week-*/[0-9][0-9]-*/*.cc|Week-*/[0-9][0-9]-*/*.cxx|Week-*/[0-9][0-9]-*/*.c)
                {
                  echo '#include <string>'
                  echo 'using namespace std;'
                  cat "$file"
                } | g++ -std=c++17 -Wall -x c++ - -c -o /dev/null || exit 1
                ;;
            esac
          done
